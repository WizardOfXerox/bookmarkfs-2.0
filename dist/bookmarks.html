        <button id="exportBookmarksBtn" class="header-btn" title="Export Bookmarks">
            <svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span>Export</span>
        </button>
        <button id="importBookmarksBtn" class="header-btn" title="Import Bookmarks">
            <svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>

                <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <span>Import</span>
        </button>
        <input type="file" id="importBookmarksFile" accept=".json" style="display:none">

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-cog"></i> Settings</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label for="gridSize">Grid Size:</label>
                    <select id="gridSize">
                        <option value="small">Small</option>
                        <option value="medium" selected>Medium</option>
                        <option value="large">Large</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="defaultSearchEngine">Default Search Engine:</label>
                    <select id="defaultSearchEngine">
                        <option value="google" selected>Google</option>
                        <option value="bing">Bing</option>
                        <option value="duckduckgo">DuckDuckGo</option>
                        <option value="yahoo">Yahoo</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="showMostVisited">Show Most Visited:</label>
                    <input type="checkbox" id="showMostVisited" checked>
                </div>
                <div class="setting-group">
                    <label for="showRecentlyAdded">Show Recently Added:</label>
                    <input type="checkbox" id="showRecentlyAdded" checked>
                </div>
                <div class="setting-group">
                    <label for="animationsEnabled">Enable Animations:</label>
                    <input type="checkbox" id="animationsEnabled" checked>
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveSettings" class="btn btn-primary">Save Settings</button>
                <button id="resetSettings" class="btn btn-secondary">Reset to Default</button>
            </div>
        </div>
    </div>

    <!-- Add Bookmark Modal -->
    <div id="addBookmarkModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-plus"></i> Add Bookmark</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="bookmarkTitle">Title:</label>
                    <input type="text" id="bookmarkTitle" placeholder="Enter bookmark title">
                </div>
                <div class="form-group">
                    <label for="bookmarkUrl">URL:</label>
                    <input type="url" id="bookmarkUrl" placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label for="bookmarkFolder">Folder:</label>
                    <select id="bookmarkFolder">
                        <option value="">Select folder...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bookmarkTags">Tags (comma-separated):</label>
                    <input type="text" id="bookmarkTags" placeholder="work, important, reference">
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveBookmark" class="btn btn-primary">Save Bookmark</button>
                <button id="cancelBookmark" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Edit Bookmark Modal -->
    <div id="editBookmarkModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-edit"></i> Edit Bookmark</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="editBookmarkTitle">Title:</label>
                    <input type="text" id="editBookmarkTitle">
                </div>
                <div class="form-group">
                    <label for="editBookmarkUrl">URL:</label>
                    <input type="url" id="editBookmarkUrl">
                </div>
                <div class="form-group">
                    <label for="editBookmarkFolder">Folder:</label>
                    <select id="editBookmarkFolder">
                        <option value="">Select folder...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editBookmarkTags">Tags (comma-separated):</label>
                    <input type="text" id="editBookmarkTags">
                </div>
            </div>
            <div class="modal-footer">
                <button id="updateBookmark" class="btn btn-primary">Update Bookmark</button>
                <button id="deleteBookmark" class="btn btn-danger">Delete Bookmark</button>
                <button id="cancelEditBookmark" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>



    <main class="main-container">
        <!-- Quick Access Section -->
        <div class="quick-access-section">
            <div class="quick-access-tabs">
                <button class="quick-tab active" data-tab="bookmarks">
                    <svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3.6 9H20.4M3.6 15H20.4M3 12C3 13.1819 3.23279 14.3522 3.68508 15.4442C4.13738 16.5361 4.80031 17.5282 5.63604 18.364C6.47177 19.1997 7.46392 19.8626 8.55585 20.3149C9.64778 20.7672 10.8181 21 12 21C13.1819 21 14.3522 20.7672 15.4442 20.3149C16.5361 19.8626 17.5282 19.1997 18.364 18.364C19.1997 17.5282 19.8626 16.5361 20.3149 15.4442C20.7672 14.3522 21 13.1819 21 12C21 9.61305 20.0518 7.32387 18.364 5.63604C16.6761 3.94821 14.3869 3 12 3C9.61305 3 7.32387 3.94821 5.63604 5.63604C3.94821 7.32387 3 9.61305 3 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M11.5 3C9.81538 5.69961 8.92224 8.81787 8.92224 12C8.92224 15.1821 9.81538 18.3004 11.5 21M12.5 3C14.1847 5.69961 15.0778 8.81787 15.0778 12C15.0778 15.1821 14.1847 18.3004 12.5 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Bookmarks
                </button>
                <button class="quick-tab" data-tab="most-visited">
                    <i class="fas fa-chart-line"></i> Most Visited
                </button>
                <button class="quick-tab" data-tab="recently-added">
                    <i class="fas fa-clock"></i> Recently Added
                </button>
            </div>
        </div>

        <!-- Bookmark Section -->
        <div class="bookmark-section">
            <!-- Breadcrumbs -->
            <div id="breadcrumbs" class="breadcrumbs">
                <span class="breadcrumb-item active" data-folder-id="root">
                    <i class="fas fa-home"></i> Home
                </span>
            </div>

            <!-- Combined Folder Navigation and Search Controls -->
            <div class="folder-controls-wrapper">
                <div id="primaryFolderTabs" class="folder-tabs"></div>
                <div class="bookmark-controls">
                    <div class="search-filter-container">
                        <div class="search-container">
                            <input type="text" id="bookmarkSearchBar" placeholder="Search your bookmarks..." autofocus>
                        </div>
                        <div class="filter-container">
                            <select id="sortBy">
                                <option value="name">Sort by Name</option>
                                <option value="date">Sort by Date</option>
                                <option value="url">Sort by URL</option>
                            </select>
                            <select id="filterBy">
                                <option value="all">All Bookmarks</option>
                                <option value="today">Added Today</option>
                                <option value="week">This Week</option>
                                <option value="month">This Month</option>
                            </select>
                        </div>
                    </div>
                    <div class="view-controls">
                        <button id="gridViewBtn" class="view-btn active" title="Grid View">
                            <i class="fas fa-th"></i>
                        </button>
                        <button id="listViewBtn" class="view-btn" title="List View">
                            <i class="fas fa-list"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Sub Folder Navigation -->
            <div id="subFolderTabs" class="folder-tabs sub-tabs"></div>
            
            <!-- Content Area -->
            <div id="contentArea" class="content-area">
                <div id="bookmarkGrid" class="bookmark-grid">
                    <!-- Bookmarks will be inserted here by JavaScript -->
                </div>
                <div id="mostVisitedGrid" class="bookmark-grid hidden">
                    <!-- Most visited sites will be inserted here -->
                </div>
                <div id="recentlyAddedGrid" class="bookmark-grid hidden">
                    <!-- Recently added bookmarks will be inserted here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner hidden">
        <div class="spinner"></div>
        <p>Loading bookmarks...</p>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="nav-init.js"></script>
    <script src="bookmarks.js"></script>
</body>
