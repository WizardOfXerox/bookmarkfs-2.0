<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading tab...</title>
    <script src="lazy.js"></script>
</head>
<body class="extension-tab dark-mode" style="background:#0b0f19;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;">
    <div style="text-align:center;">
        <div style="border: 4px solid rgba(2,255,136,0.1); border-top: 4px solid #02ff88; border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; margin: 0 auto 16px auto;"></div>
        <div style="font-size:14px;color:#a1a1aa;">Click to wake up this tab</div>
    </div>
    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
