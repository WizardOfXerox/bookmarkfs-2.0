<!DOCTYPE html>
<html lang="en">
<head>
    <script src="theme-init.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookmarkFS Sessions</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sessions-dashboard {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            gap: 20px;
            max-width: 100%;
            margin: 20px auto;
            padding: 0 20px;
            height: calc(100vh - 120px);
            box-sizing: border-box;
        }

        /* Sidebar Column */
        .workspace-sidebar {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }
        .sidebar-title {
            color: var(--accent);
            font-size: 16px;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .workspace-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .workspace-item {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-primary);
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }
        .workspace-item:hover {
            background-color: rgba(2, 255, 136, 0.05);
            border-color: rgba(2, 255, 136, 0.2);
        }
        .workspace-item.active {
            background-color: rgba(2, 255, 136, 0.15);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }
        .workspace-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        .tab-badge {
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 20px;
        }
        .workspace-item.active .tab-badge {
            background-color: var(--accent);
            color: #0b0f19;
            font-weight: 600;
        }

        /* Middle Selected Workspace View */
        .workspace-main {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }
        .main-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .selected-title {
            margin: 0;
            color: var(--accent);
            font-size: 20px;
            font-weight: 700;
        }
        #btn-rename-session {
            background-color: transparent !important;
            border: 1px solid var(--border) !important;
            color: var(--text-secondary) !important;
            padding: 4px 8px !important;
            font-size: 11px !important;
            transition: all 0.2s ease !important;
        }
        #btn-rename-session:hover {
            border-color: var(--accent) !important;
            color: var(--accent) !important;
            background-color: rgba(2, 255, 136, 0.05) !important;
        }
        .workspace-toolbar {
            display: flex;
            gap: 8px;
        }
        .toolbar-btn {
            padding: 6px 12px;
            font-size: 12px;
        }
        .workspace-tabs {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            flex: 1;
            padding-right: 6px;
        }
        .tab-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            transition: all 0.2s ease;
        }
        .tab-row:hover {
            border-color: var(--accent);
            background-color: rgba(2, 255, 136, 0.02);
            box-shadow: 0 4px 12px rgba(2, 255, 136, 0.05);
        }
        .tab-info-group {
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            flex: 1;
            overflow: hidden;
        }
        .tab-favicon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            object-fit: cover;
        }
        .tab-details {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .tab-title-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-decoration: none;
        }
        .tab-title-text:hover {
            color: var(--accent);
        }
        .tab-url-text {
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tab-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-tab-close {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .btn-tab-close:hover {
            color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
        }

        /* Right Column (Active Window Tabs) */
        .workspace-right {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }
        .right-header {
            color: var(--accent);
            font-size: 15px;
            font-weight: 700;
            margin: 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            text-align: left;
        }
        .active-window-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            flex: 1;
            padding-right: 4px;
        }
        .active-tab-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.01);
            text-align: left;
            overflow: hidden;
        }
        .active-tab-title {
            font-size: 12px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Responsive Layout styling rules */
        @media (max-width: 900px) {
            .sessions-dashboard {
                grid-template-columns: 1fr;
                height: auto;
                padding: 0 10px;
                gap: 12px;
            }
            .workspace-sidebar, .workspace-main, .workspace-right {
                height: 350px;
            }
        }
        @media (max-width: 750px) {
            body {
                padding: 8px !important;
            }
            .sessions-dashboard {
                margin: 10px auto !important;
                padding: 0 4px !important;
            }
            .workspace-sidebar, .workspace-main, .workspace-right {
                height: 280px !important;
                padding: 12px !important;
                border-radius: 10px !important;
            }
            .main-header {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 12px !important;
            }
            .selected-title {
                font-size: 15px !important;
            }
            .workspace-toolbar {
                gap: 6px !important;
                flex-wrap: wrap !important;
                width: 100% !important;
            }
            .toolbar-btn {
                padding: 6px 10px !important;
                font-size: 11px !important;
                border-radius: 20px !important;
            }
            .tab-row {
                padding: 6px 10px !important;
            }
            .tab-title-text {
                font-size: 12px !important;
            }
        }

        /* Responsive Redirection Navbar (width <= 900px) */
        @media (max-width: 900px) {
            #panel-nav-bar {
                width: 100% !important;
                flex-direction: column !important;
                align-items: stretch !important;
                border-radius: 0 !important;
                margin: 0 0 8px 0 !important;
                padding: 8px !important;
                gap: 8px !important;
            }
            .nav-links {
                flex-wrap: wrap !important;
                justify-content: center !important;
                width: 100% !important;
                gap: 0 !important;
            }
            .nav-controls {
                justify-content: center !important;
                width: 100% !important;
            }
            .nav-btn {
                display: inline-flex !important;
                align-items: center !important;
                justify-content: center !important;
                gap: 0 !important;
                padding: 8px 12px !important;
                font-size: 16px !important;
                border-radius: 20px !important;
                flex: 1 1 auto !important;
                text-align: center !important;
                text-decoration: none !important;
                white-space: nowrap !important;
            }
            .nav-btn span {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <script src="/screenshot-theme.js"></script>
    <div id="panel-nav-bar">
        <div class="nav-links">
            <a href="index.html" class="nav-btn">📁 <span>Files</span></a>
            <a href="bookmarks.html" class="nav-btn">🔖 <span>Bookmarks</span></a>
            <a href="sessions.html" class="nav-btn active">🪟 <span>Sessions</span></a>
            <a href="web.html" class="nav-btn">🌐 <span>Web</span></a>
            <a href="notes.html" class="nav-btn">📝 <span>Notes</span></a>
            <a href="/dist/capture.html" class="nav-btn">📸 <span>Screenshot</span></a>
            <a href="index.html?panel=twofa" class="nav-btn">🔐 <span>2FA</span></a>
            
            <div class="nav-dropdown" style="position: relative; display: inline-block;">
                <button class="nav-btn dropdown-trigger">🛠️ <span>Tools ▾</span></button>
                <div class="dropdown-content">
                    <a href="index.html?panel=qrscanner" class="nav-btn">🔍 <span>QR Scanner</span></a>
                    <a href="index.html?panel=passwords" class="nav-btn">🔑 <span>Passwords</span></a>
                    <a href="ua.html" class="nav-btn">🕵️ <span>UA</span></a>
                    <a href="index.html?panel=calc" class="nav-btn">🧮 <span>Calc</span></a>
                    <a href="index.html?panel=clock" class="nav-btn">⏰ <span>Clock</span></a>
                    <a href="index.html?panel=regex" class="nav-btn">🔍 <span>Regex</span></a>
                    <a href="index.html?panel=color" class="nav-btn">🎨 <span>Color</span></a>
                    <a href="index.html?panel=api" class="nav-btn">📦 <span>API</span></a>
                    <a href="index.html?panel=privacy" class="nav-btn">🛡️ <span>Privacy</span></a>
                    <a href="index.html?panel=rss" class="nav-btn">📡 <span>RSS</span></a>
                    <a href="index.html?panel=timetracker" class="nav-btn">📊 <span>Time</span></a>
                </div>
            </div>
        </div>
        <div class="nav-controls">
            <button id="global-theme-toggle" class="nav-btn" style="background:transparent;border:none;cursor:pointer;padding:6px 12px;margin-left:8px;"></button>
        </div>
    </div>

    <div class="sessions-dashboard">
        <!-- Sidebar Workspace List -->
        <div class="workspace-sidebar">
            <h3 class="sidebar-title">🪟 <span>Saved Workspaces</span></h3>
            <input type="text" id="workspace-search-input" placeholder="🔍 Search workspaces..." style="width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: var(--text-primary); font-size: 13px; box-sizing: border-box; margin-bottom: 8px;">
            <div id="workspace-list-container" class="workspace-list">
                <!-- Populated dynamically -->
            </div>
            <div style="margin-top: auto; padding-top: 14px; border-top: 1px solid var(--border); display: flex; gap: 8px;">
                <button id="btn-export-all-sessions" class="button toolbar-btn" style="flex: 1; font-size: 11px; padding: 6px;" title="Export all workspaces to a JSON file">📥 Backup</button>
                <button id="btn-import-sessions" class="button toolbar-btn" style="flex: 1; font-size: 11px; padding: 6px;" title="Import workspaces from a JSON backup">📤 Restore</button>
                <input type="file" id="import-sessions-file" accept=".json" style="display: none;">
            </div>
        </div>

        <!-- Middle Active Selected Workspace Tabs -->
        <div class="workspace-main">
            <div class="main-header">
                <div style="display: flex; align-items: center; gap: 10px; overflow: hidden; flex: 1;">
                    <h2 id="selected-workspace-title" class="selected-title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%;">Select a Workspace</h2>
                    <button id="btn-rename-session" class="button toolbar-btn" style="padding: 4px 8px; font-size: 11px; background: transparent; border: 1px solid var(--border); display: none;" title="Rename Workspace">✏️ <span>Rename</span></button>
                </div>
                <div class="workspace-toolbar">
                    <button id="btn-restore-all" class="button toolbar-btn">🚀 Restore</button>
                    <button id="btn-open-win" class="button toolbar-btn">🗔 Win</button>
                    <button id="btn-open-group" class="button toolbar-btn">🏷️ <span>Group</span></button>
                    <button id="btn-append-tab" class="button toolbar-btn">➕ Append Tab</button>
                    <button id="btn-delete-session" class="button toolbar-btn" style="background-color:#7f1d1d;">🗑️ <span>Delete</span></button>
                </div>
            </div>
            <div id="workspace-tabs-container" class="workspace-tabs">
                <!-- Dynamic tabs row populated here -->
            </div>
        </div>

        <!-- Right Active Window Snapshots -->
        <div class="workspace-right">
            <h3 class="right-header">💻 Active Window</h3>
            <button id="snapshot-workspace-btn" class="button" style="width:100%; margin-bottom: 8px;">💾 Save Workspace Snapshot</button>
            <label style="display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-secondary); cursor:pointer; margin-bottom:12px;">
                <input type="checkbox" id="auto-restore-checkbox"> Auto-restore last session on load
            </label>
            <div id="active-tabs-list" class="active-window-list">
                <!-- Current window tabs list -->
            </div>
        </div>
    </div>

    <script src="nav-init.js"></script>
    <script src="sessions.js"></script>
</body>
</html>
