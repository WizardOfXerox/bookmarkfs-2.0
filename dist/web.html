<!DOCTYPE html>
<html lang="en">
<head>
    <script src="theme-init.js"></script>
    <meta charset="UTF-8">
    <title>BookmarkFS - Web Browser</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .web-browser-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 80px);
            width: 100%;
            margin-top: 10px;
            box-sizing: border-box;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--border-radius-large);
            overflow: hidden;
        }

        /* Web Controls toolbar */
        .web-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border-bottom: 1px solid var(--border);
            background-color: var(--bg-card);
            flex-wrap: wrap;
        }

        .web-navigation-buttons {
            display: flex;
            gap: 4px;
        }

        .web-btn {
            background-color: var(--bg-button);
            border: 1px solid var(--border);
            color: var(--accent);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .web-btn:hover {
            background-color: var(--accent-glow);
            border-color: var(--accent);
        }

        #web-address-bar {
            flex: 1;
            min-width: 150px;
            padding: 6px 12px;
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        #web-address-bar:focus {
            border-color: var(--accent);
        }

        /* Main iframe viewport */
        .web-viewport {
            flex: 1;
            width: 100%;
            border: none;
            background-color: #ffffff;
        }

        /* Responsive adaptations for narrow width */
        @media (max-width: 750px) {
            body {
                padding: 8px !important;
            }
            .web-browser-container {
                height: calc(100vh - 100px);
                margin-top: 5px;
            }
            .web-controls {
                gap: 6px !important;
                padding: 8px !important;
            }
            #web-address-bar {
                width: 100% !important;
                flex: none !important;
                order: -1;
            }
        }

        /* Responsive Redirection Navbar (width <= 900px) */
        @media (max-width: 900px) {
            #panel-nav-bar {
                width: 100% !important;
                flex-direction: column !important;
                align-items: stretch !important;
                border-radius: 0 !important;
                margin: 0 0 8px 0 !important;
                padding: 8px !important;
                gap: 8px !important;
            }
            .nav-links {
                flex-wrap: wrap !important;
                justify-content: center !important;
                width: 100% !important;
                gap: 6px !important;
            }
            .nav-controls {
                justify-content: center !important;
                width: 100% !important;
            }
            .nav-btn {
                display: inline-flex !important;
                align-items: center !important;
                justify-content: center !important;
                gap: 4px !important;
                padding: 6px 10px !important;
                font-size: 11px !important;
                border-radius: 6px !important;
                flex: 1 1 auto !important;
                text-align: center !important;
                text-decoration: none !important;
                white-space: nowrap !important;
            }
        }
    </style>
</head>
<body>
    <script src="/screenshot-theme.js"></script>
    <div id="panel-nav-bar">
        <div class="nav-links">
            <a href="index.html" class="nav-btn" title="Files">📁 <span>Files</span></a>
            <a href="bookmarks.html" class="nav-btn" title="Bookmarks">🔖 <span>Bookmarks</span></a>
            <a href="sessions.html" class="nav-btn" title="Sessions">🪟 <span>Sessions</span></a>
            <a href="web.html" class="nav-btn active" title="Web">🌐 <span>Web</span></a>
            <a href="notes.html" class="nav-btn" title="Notes">📝 <span>Notes</span></a>
            <a href="/dist/capture.html" class="nav-btn" title="Screenshot">📸 <span>Screenshot</span></a>
            <a href="index.html?panel=twofa" class="nav-btn" title="2FA Keys">🔐 <span>2FA</span></a>
            
            <div class="nav-dropdown" style="position: relative; display: inline-block;">
                <button class="nav-btn dropdown-trigger" title="Tools">🛠️ <span>Tools ▾</span></button>
                <div class="dropdown-content">
                    <a href="index.html?panel=qrscanner" class="nav-btn" title="QR Scanner">🔍 <span>QR Scanner</span></a>
                    <a href="index.html?panel=passwords" class="nav-btn" title="Passwords">🔑 <span>Passwords</span></a>
                    <a href="ua.html" class="nav-btn" title="User Agent">🕵️ <span>UA</span></a>
                    <a href="index.html?panel=calc" class="nav-btn" title="Calculator">🧮 <span>Calc</span></a>
                    <a href="index.html?panel=clock" class="nav-btn" title="Clock">⏰ <span>Clock</span></a>
                    <a href="index.html?panel=regex" class="nav-btn" title="Regex">🔍 <span>Regex</span></a>
                    <a href="index.html?panel=color" class="nav-btn" title="Color">🎨 <span>Color</span></a>
                    <a href="index.html?panel=api" class="nav-btn" title="API">📦 <span>API</span></a>
                    <a href="index.html?panel=privacy" class="nav-btn" title="Privacy">🛡️ <span>Privacy</span></a>
                    <a href="index.html?panel=rss" class="nav-btn" title="RSS">📡 <span>RSS</span></a>
                    <a href="index.html?panel=timetracker" class="nav-btn" title="Time">📊 <span>Time</span></a>
                </div>
            </div>
        </div>
        <div class="nav-controls">
            <button id="global-theme-toggle" class="nav-btn" title="Toggle Theme" style="background:transparent;border:none;cursor:pointer;padding:6px 12px;margin-left:8px;"></button>
        </div>
    </div>

    <div class="web-browser-container">
        <div class="web-controls">
            <div class="web-navigation-buttons">
                <button id="web-back" class="web-btn" title="Back">◀</button>
                <button id="web-forward" class="web-btn" title="Forward">▶</button>
                <button id="web-reload" class="web-btn" title="Reload">🔄</button>
                <button id="web-home" class="web-btn" title="Home">🏠</button>
            </div>
            <input type="text" id="web-address-bar" placeholder="Type URL or search Google..." value="https://www.google.com">
            <button id="web-go" class="web-btn" title="Go">➔</button>
            <button id="web-tab" class="web-btn" title="Open in new Tab">↗</button>
        </div>
        <iframe id="web-iframe" class="web-viewport" src="https://www.wikipedia.org"></iframe>
    </div>

    <script src="nav-init.js"></script>
    <script src="web.js"></script>
</body>
</html>
